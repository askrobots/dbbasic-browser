<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'" />
    <title>dbbasic-browser</title>
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; font: 13px -apple-system, system-ui, sans-serif; }
      body { display: flex; flex-direction: column; background: #1e1e22; color: #e8e8ea; }
      #bar { display: flex; align-items: center; gap: 8px; padding: 8px 10px; background: #26262b; border-bottom: 1px solid #000; }
      #url { flex: 1; padding: 7px 12px; border-radius: 7px; border: 1px solid #3a3a40; background: #131316; color: #e8e8ea; font-size: 13px; }
      #url:focus { outline: none; border-color: #5b8cff; }
      .btn { padding: 7px 10px; border-radius: 7px; border: 1px solid #3a3a40; background: #131316; color: #e8e8ea; cursor: pointer; white-space: nowrap; }
      .btn:hover { background: #1c1c20; }
      .btn.on { background: #23324e; border-color: #3a5a9a; color: #cde0ff; }
      #inspectBtn { position: relative; }
      #inspectCount { position: absolute; top: -6px; right: -6px; background: #5b8cff; color: #fff; border-radius: 999px; font-size: 10px; min-width: 16px; height: 16px; padding: 0 4px; display: none; align-items: center; justify-content: center; }
      #meter { font-variant-numeric: tabular-nums; padding: 6px 10px; border-radius: 7px; background: #10240f; color: #7ee787; border: 1px solid #1c4a1a; white-space: nowrap; }
      #meter.zero { background: #131316; color: #8a8a90; border-color: #2a2a30; }
      #bal { font-variant-numeric: tabular-nums; padding: 6px 10px; border-radius: 7px; background: #131316; color: #8a8a90; border: 1px solid #2a2a30; white-space: nowrap; cursor: pointer; }
      #bal.funded { color: #cde0ff; border-color: #3a5a9a; }
      #bal:hover { background: #1c1c20; }
      #mbal { font-variant-numeric: tabular-nums; padding: 6px 10px; border-radius: 7px; background: #131316; color: #8a8a90; border: 1px solid #2a2a30; white-space: nowrap; }
      #mbal.earning { color: #7ee787; border-color: #1c4a1a; }
      .txlink { color: #7aa2ff; cursor: pointer; text-decoration: underline; }
      #main { flex: 1; display: flex; min-height: 0; }
      #page { flex: 1; border: 0; height: 100%; background: #fff; }
      #inspector { width: 400px; flex: none; background: #17171b; border-left: 1px solid #000; display: none; flex-direction: column; }
      #inspector.open { display: flex; }
      #insHead { display: flex; align-items: center; gap: 6px; padding: 10px 12px; border-bottom: 1px solid #2a2a30; font-weight: 600; }
      #insHead .sub { color: #8a8a90; font-weight: 400; font-size: 12px; margin-left: auto; }
      .insTab { border: 1px solid #2a2a30; background: #131316; color: #8a8a90; font-size: 11px; padding: 3px 9px; border-radius: 6px; cursor: pointer; font-weight: 600; }
      .insTab.on { background: #23324e; border-color: #3a5a9a; color: #cde0ff; }
      .histrow { display: flex; align-items: center; gap: 8px; padding: 8px 11px; background: #1e1e24; border: 1px solid #2a2a30; border-radius: 8px; }
      .histrow .t { color: #7a7a82; font-variant-numeric: tabular-nums; font-size: 11px; white-space: nowrap; }
      .histrow .h { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-family: ui-monospace, Menlo, monospace; font-size: 11px; color: #c8c8ce; }
      .histrow .p { font-variant-numeric: tabular-nums; }
      #histTotal { padding: 8px 11px; color: #8a8a90; font-size: 12px; border-bottom: 1px solid #2a2a30; }
      #insList { overflow: auto; padding: 8px; display: flex; flex-direction: column; gap: 8px; }
      #insEmpty { color: #6a6a72; padding: 24px 12px; text-align: center; font-size: 12px; line-height: 1.6; }
      .row { background: #1e1e24; border: 1px solid #2a2a30; border-radius: 9px; overflow: hidden; }
      .row > .top { display: flex; align-items: center; gap: 8px; padding: 9px 11px; cursor: pointer; }
      .row .path { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-family: ui-monospace, Menlo, monospace; font-size: 11.5px; color: #c8c8ce; }
      .row .price { font-variant-numeric: tabular-nums; color: #e8e8ea; }
      .pill { font-size: 10.5px; padding: 2px 8px; border-radius: 999px; white-space: nowrap; }
      .pill.paid { background: #10240f; color: #7ee787; }
      .pill.quoted { background: #201a0a; color: #f0c674; }
      .pill.prompt { background: #1a2033; color: #9ab4ff; }
      .pill.refused { background: #241010; color: #ff9a9a; }
      .detail { display: none; border-top: 1px solid #2a2a30; padding: 9px 11px; font-size: 11.5px; }
      .row.open .detail { display: block; }
      .detail dl { display: grid; grid-template-columns: 96px 1fr; gap: 3px 10px; margin: 0; }
      .detail dt { color: #7a7a82; }
      .detail dd { margin: 0; font-family: ui-monospace, Menlo, monospace; font-size: 11px; word-break: break-all; color: #cdcdd3; }
      .detail dd.warn { color: #f0c674; }
      .detail .step { margin: 8px 0 2px; color: #8a8a90; font-weight: 600; letter-spacing: .03em; text-transform: uppercase; font-size: 10px; }
      #toast { position: fixed; right: 14px; bottom: 14px; display: flex; flex-direction: column; gap: 6px; z-index: 10; }
      .note { padding: 8px 12px; border-radius: 8px; font-size: 12px; box-shadow: 0 4px 16px rgba(0,0,0,.4); animation: in .15s ease-out; }
      .note.paid { background: #10240f; color: #7ee787; border: 1px solid #1c4a1a; }
      .note.quoted { background: #201a0a; color: #f0c674; border: 1px solid #4a3a12; }
      .note.skipped { background: #241010; color: #ff9a9a; border: 1px solid #4a1a1a; }
      @keyframes in { from { opacity: 0; transform: translateY(6px); } }
    </style>
  </head>
  <body>
    <div id="bar">
      <button class="btn" id="back">‹</button>
      <button class="btn" id="fwd">›</button>
      <input id="url" placeholder="Enter a URL — http(s) requests are x402 pay-aware" spellcheck="false" />
      <button class="btn" id="tourBtn" title="Guided tour of the demo gallery">▶ Tour</button>
      <button class="btn" id="inspectBtn" title="x402 inspector">⚡ x402<span id="inspectCount">0</span></button>
      <div id="bal" class="chip" title="Your wallet USDC on Base Sepolia — click to copy address">◈ —</div>
      <div id="mbal" title="Merchant wallet — live payments land here" style="display:none">🏪 —</div>
      <button class="btn" id="refundBtn" title="Refund merchant → you" style="display:none">Refund</button>
      <button class="btn" id="fundBtn" title="Copy address + open the faucet">Fund</button>
      <div id="meter" class="zero" title="Total paid this session">$0.00</div>
    </div>
    <div id="main">
      <webview id="page" src="about:blank"></webview>
      <div id="inspector">
        <div id="insHead">
          <span>x402</span>
          <button class="insTab on" id="tabPage">this page</button>
          <button class="insTab" id="tabSession">session</button>
          <span class="sub" id="insSub">this page</span>
        </div>
        <div id="insList"><div id="insEmpty">No x402 activity yet.<br />Load a page that returns 402 Payment Required — every challenge, decision, and payment shows up here.</div></div>
      </div>
    </div>
    <div id="toast"></div>

    <script>
      const $ = (id) => document.getElementById(id);
      const page = $("page");
      const urlInput = $("url");

      function go(raw) {
        let u = raw.trim();
        if (!u) return;
        if (!/^[a-z][a-z0-9+.-]*:\/\//i.test(u)) {
          // Default to https, but loopback and private-LAN dev hosts are almost always
          // http — forcing https there just fails the handshake and shows a blank page.
          const host = u.split("/")[0].split(":")[0];
          const isLocal =
            host === "localhost" ||
            host.endsWith(".local") ||
            /^127(\.\d+){3}$/.test(host) ||
            /^10(\.\d+){3}$/.test(host) ||
            /^192\.168(\.\d+){2}$/.test(host) ||
            /^172\.(1[6-9]|2\d|3[01])(\.\d+){2}$/.test(host);
          u = (isLocal ? "http://" : "https://") + u;
        }
        urlInput.value = u;
        page.src = u;
      }
      urlInput.addEventListener("keydown", (e) => { if (e.key === "Enter") go(urlInput.value); });
      $("back").onclick = () => page.canGoBack() && page.goBack();
      $("fwd").onclick = () => page.canGoForward() && page.goForward();
      // Reset the inspector when navigation STARTS — the page's payment events fire
      // during the load, so resetting on did-navigate (after) would wipe the very
      // entries that belong to this page.
      page.addEventListener("did-start-navigation", (e) => {
        if (e.isMainFrame && !e.isInPlace) resetInspector();
      });
      page.addEventListener("did-navigate", (e) => { urlInput.value = e.url; });

      function toast(cls, text, ms = 4000) {
        const n = document.createElement("div");
        n.className = "note " + cls;
        n.textContent = text;
        $("toast").appendChild(n);
        setTimeout(() => n.remove(), ms);
      }

      // ---- guided tour -----------------------------------------------------
      const sleep = (ms) => new Promise((r) => setTimeout(r, ms));
      function currentBase() {
        try {
          const u = new URL(page.getURL());
          if (u.protocol.startsWith("http")) return u.origin;
        } catch {}
        return "http://127.0.0.1:8899"; // default demo gallery
      }
      const TOUR = [["/", 2600], ["/room", 3400], ["/article", 3400], ["/free", 2800], ["/unknown", 3400], ["/", 1600]];
      let touring = false;
      $("tourBtn").onclick = async () => {
        if (touring) { touring = false; return; } // second click stops
        touring = true;
        $("tourBtn").classList.add("on");
        setInspector(true);
        const base = currentBase();
        for (const [route, dwell] of TOUR) {
          if (!touring) break;
          go(base + route);
          await sleep(dwell);
        }
        touring = false;
        $("tourBtn").classList.remove("on");
      };

      // ---- inspector -------------------------------------------------------
      const rows = new Map(); // resource URL -> accumulated lifecycle (this page)
      const history = []; // persistent session log, newest-first
      let view = "page"; // "page" | "session"
      let inspectorOpen = false;
      let userClosed = false; // once the user closes it on a page, stop auto-opening

      function setInspector(open) {
        inspectorOpen = open;
        $("inspector").classList.toggle("open", open);
        $("inspectBtn").classList.toggle("on", open);
      }
      $("inspectBtn").onclick = () => {
        setInspector(!inspectorOpen);
        userClosed = !inspectorOpen;
      };
      function setView(v) {
        view = v;
        $("tabPage").classList.toggle("on", v === "page");
        $("tabSession").classList.toggle("on", v === "session");
        renderInspector();
      }
      $("tabPage").onclick = () => setView("page");
      $("tabSession").onclick = () => setView("session");

      function resetInspector() {
        rows.clear();
        userClosed = false; // new page — allow auto-open again
        renderInspector();
      }

      function cheapest(quotes) {
        return (quotes || []).reduce((a, b) => (!a || parseFloat(b.price.replace("$","")) < parseFloat(a.price.replace("$","")) ? b : a), null);
      }

      function statusOf(e) {
        if (e.outcome === "paid") return { cls: "paid", label: e.paidStatus === "delivered" ? "paid" : (e.paidStatus || "paid") };
        if (e.outcome === "skipped") {
          const r = (e.skipReason || "").toLowerCase();
          if (r.includes("declined by user")) return { cls: "refused", label: "you declined" };
          if (r.includes("unknown asset") || r.includes("cannot price") || r.includes("not allowed") || r.includes("scheme")) return { cls: "refused", label: "refused" };
          return { cls: "refused", label: "skipped" };
        }
        if (e.decision === "prompt") return { cls: "prompt", label: "waiting…" };
        if (e.decision === "deny") return { cls: "refused", label: "refused" };
        if (e.quote) return { cls: "quoted", label: "quoted" };
        return { cls: "quoted", label: "…" };
      }

      function shortPath(u) {
        try { const x = new URL(u); return x.host + x.pathname; } catch { return u; }
      }

      function isRealTx(tx) {
        return typeof tx === "string" && /^0x[0-9a-fA-F]{64}$/.test(tx) && !tx.startsWith("0xDEMO");
      }
      function txCell(tx) {
        if (!tx) return "(pending)";
        if (isRealTx(tx)) return '<span class="txlink" data-url="https://sepolia.basescan.org/tx/' + tx + '">' + tx.slice(0, 18) + "… ↗</span>";
        return tx.slice(0, 10) + "… (mock)";
      }
      // Click a real tx → open it on BaseScan in the page.
      $("insList").addEventListener("click", (e) => {
        const l = e.target.closest(".txlink");
        if (l && l.dataset.url) go(l.dataset.url);
      });

      function renderInspector() {
        const badge = $("inspectCount");
        badge.textContent = rows.size;
        badge.style.display = rows.size ? "flex" : "none";
        if (view === "session") return renderSession();
        return renderPage();
      }

      function renderSession() {
        const list = $("insList");
        $("insSub").textContent = history.length ? `${history.length} events` : "session";
        if (history.length === 0) {
          list.innerHTML = '<div id="insEmpty">Nothing charged yet this session.<br />Every payment and refusal is logged here, timestamped — and it persists as you navigate.</div>';
          return;
        }
        list.innerHTML = `<div id="histTotal">Session total <b style="color:#7ee787">${$("meter").textContent}</b> · ${history.length} events</div>`;
        for (const h of history) {
          const el = document.createElement("div");
          el.className = "histrow";
          el.innerHTML =
            `<span class="t">${h.at}</span>
             <span class="h" title="${h.resource}">${shortPath(h.resource)}</span>
             <span class="p">${h.price}</span>
             <span class="pill ${h.cls}">${h.label}</span>`;
          list.appendChild(el);
        }
      }

      function renderPage() {
        const list = $("insList");
        const count = rows.size;
        $("insSub").textContent = count ? `${count} on this page` : "this page";

        if (count === 0) {
          list.innerHTML = '<div id="insEmpty">No x402 activity yet.<br />Load a page that returns 402 Payment Required — every challenge, decision, and payment shows up here.</div>';
          return;
        }
        list.innerHTML = "";
        for (const e of rows.values()) {
          const st = statusOf(e);
          const q = e.quote;
          const row = document.createElement("div");
          row.className = "row";
          row.innerHTML =
            `<div class="top">
               <span class="path" title="${e.resource}">${shortPath(e.resource)}</span>
               <span class="price">${q ? q.price : "—"}</span>
               <span class="pill ${st.cls}">${st.label}</span>
             </div>
             <div class="detail">
               <div class="step">Request</div>
               <dl>
                 <dt>requested</dt><dd>${e.requested || e.resource}</dd>
                 ${e.requested && e.requested !== e.resource ? `<dt>402 claims</dt><dd class="warn">${e.resource}</dd>` : ""}
               </dl>
               <div class="step">Challenge</div>
               <dl>
                 <dt>scheme</dt><dd>${q ? q.scheme : "—"}</dd>
                 <dt>network</dt><dd>${q ? q.network : "—"}</dd>
                 <dt>asset</dt><dd>${q ? q.asset + " · " + q.assetAddress : "—"}</dd>
                 <dt>amount</dt><dd>${q ? q.amountAtomic + " atomic" : "—"}</dd>
                 <dt>pay to</dt><dd>${q ? q.payTo : "—"}</dd>
                 <dt>max ttl</dt><dd>${q ? q.maxTimeoutSeconds + "s" : "—"}</dd>
               </dl>
               ${e.quotes && e.quotes.length > 1 ? `<div class="step">Offered (cheapest wins)</div>
                 <dl>${e.quotes.map((o) => `<dt>${o.network}</dt><dd>${o.price} ${o.asset}${o === e.quote ? ' <span class="warn">← paid</span>' : ""}</dd>`).join("")}</dl>` : ""}
               <div class="step">Decision</div>
               <dl><dt>action</dt><dd>${e.decision || "—"}</dd><dt>reason</dt><dd>${e.reason || "—"}</dd></dl>
               ${e.outcome === "paid" && e.auth ? `<div class="step">Signed authorization (EIP-3009)</div>
                 <dl>
                   <dt>from</dt><dd>${e.auth.from}</dd>
                   <dt>to</dt><dd>${e.auth.to}</dd>
                   <dt>value</dt><dd>${e.auth.value} atomic</dd>
                   <dt>valid</dt><dd>${new Date(e.auth.validAfter*1000).toLocaleTimeString()} – ${new Date(e.auth.validBefore*1000).toLocaleTimeString()}</dd>
                   <dt>nonce</dt><dd>${e.nonce || "—"}</dd>
                   <dt>signature</dt><dd>${e.signature ? e.signature.slice(0,42) + "…" : "—"}</dd>
                 </dl>` : ""}
               ${e.outcome === "paid" ? `<div class="step">Settlement</div>
                 <dl>
                   <dt>status</dt><dd>${e.paidStatus}</dd>
                   <dt>tx</dt><dd>${txCell(e.tx)}</dd>
                 </dl>` : ""}
               ${e.rejected && e.rejected.length ? `<div class="step">Rejected options</div><dl><dt>—</dt><dd>${e.rejected.join("<br>")}</dd></dl>` : ""}
             </div>`;
          row.querySelector(".top").onclick = () => row.classList.toggle("open");
          list.appendChild(row);
        }
      }

      function upsert(resource, patch) {
        const e = rows.get(resource) || { resource };
        Object.assign(e, patch);
        rows.set(resource, e);
        if (!inspectorOpen && !userClosed) setInspector(true); // surface payment activity
        renderInspector();
      }

      // Log a terminal outcome (paid / refused) to the persistent session history.
      function logHistory(resource) {
        const e = rows.get(resource);
        if (!e) return;
        const st = statusOf(e);
        history.unshift({
          resource,
          price: e.quote ? e.quote.price : "—",
          label: st.label,
          cls: st.cls,
          at: new Date().toLocaleTimeString(),
        });
        if (view === "session") renderInspector();
      }

      window.x402.onEvent((ev) => {
        if (ev.kind === "quoted") {
          const c = cheapest(ev.quotes);
          upsert(ev.resource, { quote: c, quotes: ev.quotes, rejected: ev.rejected });
          if (c) toast("quoted", `Price: ${c.price} ${c.asset} — ${shortPath(ev.resource)}`, 2500);
        } else if (ev.kind === "decided") {
          upsert(ev.resource, { decision: ev.action, reason: ev.reason });
        } else if (ev.kind === "paid") {
          const meter = $("meter");
          meter.textContent = ev.totalSpent;
          meter.classList.toggle("zero", ev.totalSpent === "$0.00");
          upsert(ev.resource, { outcome: "paid", paidStatus: ev.status, nonce: ev.nonce, validBefore: ev.validBefore, tx: ev.tx, requested: ev.requested, auth: ev.auth, signature: ev.signature });
          logHistory(ev.resource);
          toast("paid", `Paid ${ev.amount} ${ev.asset} → ${new URL(ev.dest).host}${ev.tx ? " ✓" : ""}`);
        } else if (ev.kind === "skipped") {
          upsert(ev.resource, { outcome: "skipped", skipReason: ev.reason });
          logHistory(ev.resource);
          toast("skipped", `Skipped: ${ev.reason}`);
        }
      });

      window.x402.spent().then((s) => {
        const meter = $("meter");
        meter.textContent = s;
        meter.classList.toggle("zero", s === "$0.00");
      });

      // ---- wallet balance + funding ----------------------------------------
      let walletAddress = "";
      window.x402.wallet().then(({ address }) => { walletAddress = address || ""; });
      window.x402.onBalance(({ usdc, address, merchantUsdc, merchantAddress }) => {
        walletAddress = address || walletAddress;
        const b = $("bal");
        b.textContent = usdc == null ? "◈ —" : "◈ " + usdc + " USDC";
        b.classList.toggle("funded", usdc != null && parseFloat(usdc) > 0);
        const mb = $("mbal");
        if (merchantAddress && merchantUsdc != null) {
          mb.style.display = "";
          mb.textContent = "🏪 " + merchantUsdc;
          mb.title = "Merchant wallet " + merchantAddress + " — live payments land here";
          const earning = parseFloat(merchantUsdc) > 0;
          mb.classList.toggle("earning", earning);
          $("refundBtn").style.display = earning ? "" : "none";
        }
      });
      $("bal").onclick = async () => {
        if (!walletAddress) return;
        await window.x402.copy(walletAddress);
        toast("quoted", "Address copied: " + walletAddress.slice(0, 12) + "…", 2200);
      };
      $("fundBtn").onclick = () => {
        window.x402.fund();
        toast("quoted", "Address copied — faucet opened in your browser. Pick Base Sepolia.", 4500);
      };
      $("refundBtn").onclick = async () => {
        const btn = $("refundBtn");
        btn.disabled = true;
        btn.textContent = "Refunding…";
        try {
          const r = await window.x402.refund();
          if (r && r.tx) toast("paid", "Refunded → you. tx " + r.tx.slice(0, 14) + "… ✓");
          else toast("skipped", "Refund: " + ((r && r.error) || "nothing to refund"));
        } finally {
          btn.disabled = false;
          btn.textContent = "Refund";
        }
      };

      if (window.x402.homepage) go(window.x402.homepage);
      urlInput.focus();
    </script>
  </body>
</html>
